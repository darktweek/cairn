name: cairn

services:
  cairn:
    image: cairn:latest
    container_name: cairn
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

    volumes:
      - cairn_data:/data

    environment:
      CAIRN_ADDR:                       ":8080"
      CAIRN_ENV:                        "production"
      CAIRN_BASE_URL:                   "http://localhost:8080"  # changer en https://... pour la prod
      CAIRN_DB_PATH:                    "/data/db.sqlite"
      CAIRN_MEDIA_PATH:                 "/data/media"
      CAIRN_MAX_UPLOAD_SIZE:            "52428800"
      CAIRN_TRUSTED_PROXY:              "true"
      # Réglages applicatifs — laissés non définis ici pour rester éditables
      # depuis Admin → Réglages → Système. Décommenter pour verrouiller.
      # CAIRN_TOTP_ISSUER:                "Cairn"
      # CAIRN_DEFAULT_WALLPAPER_LIMIT:    "10"
      # CAIRN_BOOKMARKLET_TOKEN_LIFETIME: "90"
      CAIRN_SMTP_HOST:                  "smtp.example.com"
      CAIRN_SMTP_PORT:                  "587"
      CAIRN_SMTP_FROM:                  "cairn@example.com"
      CAIRN_SMTP_TLS:                   "true"
      # Menu — bang qui ouvre le hub plein écran. Vide = éditable dans l'admin (défaut !menu).
      # CAIRN_MENU_BANG:                "!menu"
      # SSO / OIDC — décommenter pour verrouiller la config via le compose.
      # Sinon, configurable depuis l'admin → Réglages → SSO.
      # Redirect URI à déclarer côté provider : <BASE_URL>/api/auth/sso/callback
      # CAIRN_OIDC_PROVIDER_NAME:       "Authentik"
      # CAIRN_OIDC_ISSUER:              "https://auth.example.com/application/o/cairn/"
      # CAIRN_OIDC_CLIENT_ID:           "cairn"
      # CAIRN_OIDC_SCOPES:              "openid profile email"

    env_file:
      - .env  # CAIRN_SESSION_SECRET, CAIRN_SMTP_USER, CAIRN_SMTP_PASS, CAIRN_OIDC_CLIENT_SECRET

    networks:
      - traefik_proxy

    labels:
      traefik.enable: "true"
      traefik.http.routers.cairn.rule: "Host(`go.dotnot.be`)"
      traefik.http.routers.cairn.entrypoints: "websecure"
      traefik.http.routers.cairn.tls.certresolver: "cloudflare"
      traefik.http.services.cairn.loadbalancer.server.port: "8080"

    healthcheck:
      test: ["CMD", "/cairn", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    ports:
      - "8080:8080"

volumes:
  cairn_data:
    driver: local

networks:
  traefik_proxy:
    external: true
    name: traefik_proxy
