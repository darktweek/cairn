<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Shared collection — Cairn</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 760px; margin: 0 auto;
           padding: 2rem 1.25rem; line-height: 1.5; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
    .folder { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888;
              margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #8884; padding-bottom: 0.25rem; }
    .bm { display: block; padding: 0.4rem 0; text-decoration: none; }
    .bm a { color: #4f46e5; text-decoration: none; font-weight: 500; }
    .bm a:hover { text-decoration: underline; }
    .bm .host { color: #999; font-size: 0.8rem; margin-left: 0.5rem; }
    .err { color: #c0392b; }
  </style>
</head>
<body>
  <h1 id="title">…</h1>
  <div class="sub" id="sub"></div>
  <div id="list"></div>

  <script>
    const token = location.pathname.split('/').pop();
    const elList = document.getElementById('list');
    const host = u => { try { return new URL(u).hostname; } catch { return ''; } };

    function makeItem(bm) {
      const wrap = document.createElement('div');
      wrap.className = 'bm';
      const a = document.createElement('a');
      a.href = bm.url; a.target = '_blank'; a.rel = 'noopener noreferrer nofollow';
      a.textContent = bm.title || bm.url;
      const span = document.createElement('span');
      span.className = 'host'; span.textContent = host(bm.url);
      wrap.append(a, span);
      return wrap;
    }

    fetch('/api/public/collections/' + encodeURIComponent(token))
      .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(data => {
        document.getElementById('title').textContent = data.name || 'Shared collection';
        const bms = data.bookmarks || [];
        const folders = data.folders || [];
        document.getElementById('sub').textContent = bms.length + ' bookmark(s) · read-only · Cairn';

        const nameById = {};
        folders.forEach(f => { nameById[f.id] = f; });
        const pathOf = id => {
          const parts = []; let cur = nameById[id]; let g = 0;
          while (cur && g++ < 50) { parts.unshift(cur.name); cur = cur.parent_id ? nameById[cur.parent_id] : null; }
          return parts.join(' / ');
        };

        const byFolder = new Map(); const noFolder = [];
        for (const bm of bms) {
          if (bm.folder_id) {
            const p = pathOf(bm.folder_id) || '—';
            if (!byFolder.has(p)) byFolder.set(p, []);
            byFolder.get(p).push(bm);
          } else noFolder.push(bm);
        }
        for (const [folder, items] of [...byFolder.entries()].sort()) {
          const h = document.createElement('div'); h.className = 'folder'; h.textContent = folder;
          elList.appendChild(h);
          items.forEach(b => elList.appendChild(makeItem(b)));
        }
        if (noFolder.length) {
          if (byFolder.size) { const h = document.createElement('div'); h.className = 'folder'; h.textContent = '—'; elList.appendChild(h); }
          noFolder.forEach(b => elList.appendChild(makeItem(b)));
        }
        if (!bms.length) elList.textContent = 'This collection is empty.';
      })
      .catch(() => {
        document.getElementById('title').textContent = 'Not found';
        document.getElementById('sub').innerHTML = '<span class="err">This share link is invalid or has been revoked.</span>';
      });
  </script>
</body>
</html>
